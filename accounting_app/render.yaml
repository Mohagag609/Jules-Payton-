# render.yaml
# Blueprint for deploying the accounting application on Render.

databases:
  - name: accounting_db
    databaseName: accounting_db
    user: accounting_user
    plan: free

services:
  - type: web
    name: accounting-app
    runtime: python
    rootDir: accounting_app
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    postDeployCommand: "python manage.py collectstatic --noinput && python manage.py migrate"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accounting_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
      # The web service's hostname is automatically added to ALLOWED_HOSTS
      # on Render, so we don't need to set it manually.
