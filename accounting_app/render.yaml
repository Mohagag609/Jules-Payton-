# render.yaml
# Blueprint for deploying the accounting application on Render.

databases:
  - name: accounting_db
    databaseName: accounting_db
    user: accounting_user
    plan: free

services:
  - type: web
    name: accounting-app
    runtime: python
    plan: free
    rootDir: accounting_app   # ← هنا عرّفت إن المشروع جوّه الفولدر ده
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: "gunicorn accounting_app.wsgi"   # ← استبدلت core بـ accounting_app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accounting_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
