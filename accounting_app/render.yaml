# render.yaml
# Blueprint for deploying the accounting application on Render.

databases:
  - name: accounting_db
    databaseName: accounting_db
    user: accounting_user
    plan: free

services:
  - type: web
    name: accounting-app
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: "gunicorn core.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accounting_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
      # The web service's hostname is automatically added to ALLOWED_HOSTS
      # on Render, so we don't need to set it manually.
