<div id="item-form-container" class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-auto p-6">
    <form
        {% if item %}
            hx-post="{% url 'accounting:projects_store:item_edit' pk=item.pk %}"
            hx-target="#item-row-{{ item.pk }}"
        {% else %}
            hx-post="{% url 'accounting:projects_store:item_create' %}"
            hx-target="#item-table-body"
            hx-swap="afterbegin"
        {% endif %}
        hx-swap="outerHTML"
        class="space-y-4">

        {% csrf_token %}

        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            {% if item %}
                تعديل صنف: {{ item.name }}
            {% else %}
                إضافة صنف جديد
            {% endif %}
        </h2>

        {{ form.as_p }}

        <div class="flex justify-end space-x-4 space-x-reverse pt-4">
            <button type="button" onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">
                إلغاء
            </button>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
                {% if item %}
                    حفظ التعديلات
                {% else %}
                    حفظ
                {% endif %}
            </button>
        </div>
    </form>
</div>
