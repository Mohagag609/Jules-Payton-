<div id="move-form-container" class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-auto p-6">
    <form
        hx-post="{% url 'accounting:projects_store:move_create' %}"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        class="space-y-4">

        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            تسجيل حركة مخزن جديدة
        </h2>

        {{ form.as_p }}

        <div class="flex justify-end space-x-4 space-x-reverse pt-4">
            <button type="button" _="on click call closeModal() on #modal-container" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">
                إلغاء
            </button>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
                حفظ الحركة
            </button>
        </div>
    </form>
</div>
