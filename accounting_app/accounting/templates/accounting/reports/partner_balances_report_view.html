{% load humanize %}
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تقرير أرصدة الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center mb-6">تقرير أرصدة الشركاء</h1>

        <table class="w-full text-sm text-right text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-200">
                <tr>
                    <th class="px-4 py-2">الشريك</th>
                    <th class="px-4 py-2">اسم المحفظة</th>
                    <th class="px-4 py-2">الرصيد الحالي</th>
                </tr>
            </thead>
            <tbody>
                {% for row in report_data %}
                <tr class="border-b">
                    <td class="px-4 py-2">{{ row.partner_name }}</td>
                    <td class="px-4 py-2">{{ row.wallet_name }}</td>
                    <td class="px-4 py-2 font-mono">{{ row.balance|intcomma }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center py-4">لا توجد محافظ مرتبطة بشركاء.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
