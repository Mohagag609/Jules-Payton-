{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">{{ page_title }}</h1>
    <button
        hx-get="{% url 'accounting:suppliers:create' %}"
        hx-target="#modal-content"
        onclick="openModal()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-300">
        إضافة مورد جديد
    </button>
</div>

<div class="bg-white p-6 rounded-2xl shadow-sm">
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-right text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3">الاسم</th>
                    <th scope="col" class="px-6 py-3">الهاتف</th>
                    <th scope="col" class="px-6 py-3 text-center">أدوات</th>
                </tr>
            </thead>
            <tbody id="supplier-table-body">
                {% for supplier in suppliers %}
                    {% include 'accounting/suppliers/_row.html' with supplier=supplier %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Modal container will be populated by HTMX -->
<div id="modal-content"></div>
{% endblock %}
