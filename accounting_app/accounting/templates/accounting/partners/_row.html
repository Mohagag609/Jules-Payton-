{% load humanize %}

<tr id="partner-row-{{ partner.pk }}" class="border-b hover:bg-gray-50">
    <td class="px-6 py-4">{{ partner.code }}</td>
    <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
        {{ partner.name }}
    </th>
    <td class="px-6 py-4">{{ partner.share_percent }}%</td>
    <td class="px-6 py-4 font-mono">{{ partner.opening_balance|intcomma }}</td>
    <td class="px-6 py-4 text-center space-x-2 space-x-reverse">
        <button
            hx-get="{% url 'accounting:partners:get_form' pk=partner.pk %}"
            hx-target="#form-container"
            hx-swap="outerHTML"
            class="text-blue-600 hover:text-blue-800 font-medium">
            تعديل
        </button>
        <button
            hx-delete="{% url 'accounting:partners:delete' pk=partner.pk %}"
            hx-target="#partner-row-{{ partner.pk }}"
            hx-swap="outerHTML"
            hx-confirm="هل أنت متأكد من رغبتك في حذف هذا الشريك؟"
            class="text-red-600 hover:text-red-800 font-medium">
            حذف
        </button>
    </td>
</tr>
