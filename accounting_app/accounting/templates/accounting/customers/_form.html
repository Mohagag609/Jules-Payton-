<div id="customer-form-container" class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-auto p-6">
    <form
        {% if customer %}
            hx-post="{% url 'accounting:customers:edit' pk=customer.pk %}"
            hx-target="#customer-row-{{ customer.pk }}"
        {% else %}
            hx-post="{% url 'accounting:customers:create' %}"
            hx-target="#customer-table-body"
            hx-swap="afterbegin"
        {% endif %}
        hx-swap="outerHTML"
        _="on htmx:afterOnLoad if event.detail.successful then call closeModal() on #modal-container"
        class="space-y-4">

        {% csrf_token %}

        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            {% if customer %}
                تعديل بيانات العميل: {{ customer.name }}
            {% else %}
                إضافة عميل جديد
            {% endif %}
        </h2>

        <div class="space-y-2">
            <div>
                <label for="{{ form.code.id_for_label }}" class="block text-sm font-medium text-gray-700">كود العميل</label>
                {{ form.code }}
            </div>
            <div>
                <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700">اسم العميل</label>
                {{ form.name }}
            </div>
            <div>
                <label for="{{ form.phone.id_for_label }}" class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
                {{ form.phone }}
            </div>
            <div>
                <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
                {{ form.email }}
            </div>
            <div>
                <label for="{{ form.address.id_for_label }}" class="block text-sm font-medium text-gray-700">العنوان</label>
                {{ form.address }}
            </div>
            <div class="flex items-center">
                {{ form.is_active }}
                <label for="{{ form.is_active.id_for_label }}" class="ml-2 rtl:mr-2 block text-sm text-gray-900">نشط</label>
            </div>
        </div>

        <div class="flex justify-end space-x-4 space-x-reverse pt-4">
            <button type="button" _="on click call closeModal() on #modal-container" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">
                إلغاء
            </button>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
                {% if customer %}
                    حفظ التعديلات
                {% else %}
                    حفظ
                {% endif %}
            </button>
        </div>
    </form>
</div>
