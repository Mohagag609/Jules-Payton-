<div id="customer-form-container" class="bg-white rounded-lg">
    <form
        {% if customer %}
            hx-post="{% url 'accounting:customers:update' pk=customer.pk %}"
            hx-target="#customer-row-{{ customer.pk }}"
        {% else %}
            hx-post="{% url 'accounting:customers:list' %}"
            hx-target="#customer-table-body"
            hx-swap="afterbegin"
        {% endif %}
        class="space-y-6">

        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
            {{ form.non_field_errors }}
        </div>
        {% endif %}

        <!-- معلومات العميل الأساسية -->
        <div class="bg-gray-50 p-6 rounded-lg">
            <h4 class="text-lg font-semibold text-gray-800 mb-4">معلومات العميل الأساسية</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in form %}
                    <div {% if field.name == 'address' or field.name == 'notes' %}class="md:col-span-2"{% endif %}>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
                            {{ field.label }}
                            {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
                        </label>
                        {{ field }}
                        {% if field.help_text %}
                        <p class="text-xs text-gray-500 mt-1">{{ field.help_text }}</p>
                        {% endif %}
                        {% if field.errors %}
                        <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
        </div>

        <!-- أزرار الإجراءات -->
        <div class="flex justify-end space-x-4 space-x-reverse border-t pt-6">
            <button type="button" onclick="closeFormModal()" 
                    class="px-6 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-500">
                إلغاء
            </button>
            <button type="submit" 
                    class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center">
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                {% if customer %}
                    حفظ التعديلات
                {% else %}
                    إضافة العميل
                {% endif %}
            </button>
        </div>
    </form>
</div>
