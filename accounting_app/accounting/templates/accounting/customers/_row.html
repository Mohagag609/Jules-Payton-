<tr id="customer-row-{{ customer.pk }}" class="border-b hover:bg-gray-50">
    <td class="px-6 py-4">{{ customer.code }}</td>
    <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
        {{ customer.name }}
    </th>
    <td class="px-6 py-4">{{ customer.phone }}</td>
    <td class="px-6 py-4">
        {% if customer.is_active %}
            <span class="bg-green-100 text-green-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">نشط</span>
        {% else %}
            <span class="bg-red-100 text-red-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">غير نشط</span>
        {% endif %}
    </td>
    <td class="px-6 py-4 text-center space-x-2 space-x-reverse">
        <button
            hx-get="{% url 'accounting:customers:get_form' pk=customer.pk %}"
            hx-target="#form-container"
            hx-swap="outerHTML"
            class="text-blue-600 hover:text-blue-800 font-medium">
            تعديل
        </button>
        <button
            hx-delete="{% url 'accounting:customers:delete' pk=customer.pk %}"
            hx-target="#customer-row-{{ customer.pk }}"
            hx-swap="outerHTML"
            hx-confirm="هل أنت متأكد من رغبتك في حذف هذا العميل؟ لا يمكن حذف عميل مرتبط بعقود."
            class="text-red-600 hover:text-red-800 font-medium">
            حذف
        </button>
    </td>
</tr>
