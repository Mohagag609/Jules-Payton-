{% load humanize %}

<tr id="unit-row-{{ unit.pk }}" class="border-b hover:bg-gray-50">
    <td class="px-6 py-4">{{ unit.code }}</td>
    <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
        {{ unit.name }}
    </th>
    <td class="px-6 py-4">{{ unit.get_type_display }}</td>
    <td class="px-6 py-4 font-mono">{{ unit.price_total|intcomma }}</td>
    <td class="px-6 py-4">
        {% if unit.contract %}
            <span class="bg-red-100 text-red-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">مباعة</span>
        {% else %}
            <span class="bg-green-100 text-green-800 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-full">متاحة</span>
        {% endif %}
    </td>
    <td class="px-6 py-4 text-center space-x-2 space-x-reverse">
        <button
            hx-get="{% url 'accounting:units:edit' pk=unit.pk %}"
            hx-target="#modal-content"
            hx-trigger="click"
            _="on htmx:afterOnLoad
                remove .hidden from #modal-container
                add .flex to #modal-container
                remove .hidden from #modal-backdrop"
            class="text-blue-600 hover:text-blue-800 font-medium {% if unit.contract %}disabled:opacity-50{% endif %}"
            {% if unit.contract %}disabled{% endif %}>
            تعديل
        </button>
        <button
            hx-delete="{% url 'accounting:units:delete' pk=unit.pk %}"
            hx-target="#unit-row-{{ unit.pk }}"
            hx-swap="outerHTML"
            hx-confirm="هل أنت متأكد من رغبتك في حذف هذه الوحدة؟ لا يمكن حذف وحدة مرتبطة بعقد."
            class="text-red-600 hover:text-red-800 font-medium {% if unit.contract %}disabled:opacity-50{% endif %}"
            {% if unit.contract %}disabled{% endif %}>
            حذف
        </button>
    </td>
</tr>
