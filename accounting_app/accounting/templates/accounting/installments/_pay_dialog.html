<div id="payment-form-container" class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-auto p-6">
    <form
        hx-post="{% url 'accounting:installments:pay' pk=installment.pk %}"
        hx-target="#installment-row-{{ installment.pk }}"
        hx-swap="outerHTML"
        _="on htmx:afterOnLoad if event.detail.successful then call closeModal() on #modal-container"
        class="space-y-4">

        {% csrf_token %}

        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            سداد قسط رقم {{ installment.seq_no }}
        </h2>

        <div class="p-4 bg-gray-50 rounded-lg">
            <p><strong>العميل:</strong> {{ installment.contract.customer.name }}</p>
            <p><strong>العقد:</strong> {{ installment.contract.code }}</p>
            <p><strong>المبلغ المستحق:</strong> {{ installment.amount|intcomma }}</p>
            <p class="text-red-600"><strong>المتبقي للدفع:</strong> {{ installment.remaining_to_pay|intcomma }}</p>
        </div>

        {{ form.as_p }}

        <div class="flex justify-end space-x-4 space-x-reverse pt-4">
            <button type="button" _="on click call closeModal() on #modal-container" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">
                إلغاء
            </button>
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">
                تأكيد السداد
            </button>
        </div>
    </form>
</div>
