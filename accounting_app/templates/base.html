<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام المحاسبة{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .htmx-indicator{
            opacity:0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator{
            opacity:1
        }
        .htmx-request.htmx-indicator{
            opacity:1
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="flex h-screen">
        <!-- Sidebar -->
        {% include '_sidebar.html' %}

        <!-- Main content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Navbar -->
            {% include '_navbar.html' %}

            <!-- Page Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
                <div class="container mx-auto px-6 py-8">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Global Modal -->
    {% include '_modal.html' %}

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] space-y-2"></div>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.xhr.status >= 400) {
                // Generic error handling for failed requests
                const errorMsg = evt.detail.xhr.responseText || 'حدث خطأ غير متوقع.';
                showToast(errorMsg, 'error');
            }
        });

        document.body.addEventListener('showToast', function(evt) {
            showToast(evt.detail.message, evt.detail.type || 'info');
        });

        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');

            let bgColor, textColor, borderColor;
            if (type === 'error') {
                bgColor = 'bg-red-100';
                textColor = 'text-red-700';
                borderColor = 'border-red-400';
            } else if (type === 'success') {
                bgColor = 'bg-green-100';
                textColor = 'text-green-700';
                borderColor = 'border-green-400';
            } else {
                bgColor = 'bg-blue-100';
                textColor = 'text-blue-700';
                borderColor = 'border-blue-400';
            }

            toast.className = `p-4 mb-4 text-sm rounded-lg border ${borderColor} ${bgColor} ${textColor}`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `<span class="font-medium">${message}</span>`;

            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.transition = 'opacity 0.5s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
