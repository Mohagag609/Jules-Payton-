[build]
  # خلي الـ base جوّه فولدر المشروع الحقيقي
  base = "accounting_app"
  # مجلد الستاتيك الناتج من collectstatic
  publish = "staticfiles"
  # أمر البيلد (لو requirements.txt داخل accounting_app)
  command = "pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput"

[build.environment]
  PYTHON_VERSION = "3.10"
  DJANGO_SETTINGS_MODULE = "accounting_app.settings"
  # لزيادة التفاصيل لو وقع بدري
  MISE_VERBOSE = "1"
